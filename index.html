<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mr. Druga">
<meta name="theme-color" content="#050505">
<title>Mr. Druga — Discipline OS</title>
<style>
:root{
  --bg:#050505;--bg2:#0d0d0d;--bg3:#141414;--bg4:#1e1e1e;--bg5:#252525;
  --gold:#C8A84B;--gold2:#dfc070;
  --red:#e04444;--green:#3cc87a;
  --white:#ffffff;--muted:#666;--muted2:#aaaaaa;--muted3:#cccccc;
  --border:rgba(200,168,75,0.15);--border2:rgba(200,168,75,0.35);
  --radius:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;overflow:hidden;font-size:16px;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}

/* AUTH SCREEN */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;z-index:1000;}
#auth-screen.hidden{display:none;}
.auth-bat{font-size:48px;margin-bottom:8px;}
.auth-title{font-family:Impact,'Arial Narrow',sans-serif;font-size:34px;letter-spacing:4px;color:var(--white);margin-bottom:4px;}
.auth-title span{color:var(--gold);}
.auth-sub{font-size:12px;color:#bbb;font-family:'Courier New',monospace;letter-spacing:2px;margin-bottom:32px;}
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:14px;font-family:'Courier New',monospace;letter-spacing:1px;cursor:pointer;background:var(--bg2);color:#bbb;border:none;transition:all 0.2s;}
.auth-tab.active{background:var(--gold);color:#050505;font-weight:700;}
.auth-form{width:100%;max-width:340px;}
.auth-inp{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--white);font-size:16px;padding:14px;outline:none;margin-bottom:10px;font-family:-apple-system,sans-serif;}
.auth-inp:focus{border-color:var(--gold2);}
.auth-inp::placeholder{color:#777;}
.auth-btn{width:100%;background:var(--gold);color:#050505;border:none;border-radius:var(--radius);padding:16px;font-family:Impact,'Arial Narrow',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;margin-top:4px;transition:all 0.15s;}
.auth-btn:active{transform:scale(0.98);opacity:0.88;}
.auth-err{font-size:13px;color:var(--red);font-family:'Courier New',monospace;margin-top:8px;text-align:center;min-height:16px;}

/* MAIN APP */
#app{display:flex;flex-direction:column;height:100dvh;}
#app.hidden{display:none;}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(75px + var(--safe-b));scroll-behavior:smooth;}
#screen::-webkit-scrollbar{display:none;}
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(60px + var(--safe-b));padding-bottom:var(--safe-b);background:#080808;border-top:1px solid rgba(200,168,75,0.15);display:flex;align-items:center;justify-content:space-around;z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:#666;cursor:pointer;font-size:9px;font-family:'Courier New',monospace;letter-spacing:0.8px;padding:0 10px;transition:color 0.2s;text-transform:uppercase;height:100%;}
.nav-btn .ni{font-size:22px;line-height:1;}
.nav-btn.active{color:var(--gold);}

.bat-header{padding:calc(14px + var(--safe-t)) 16px 0;display:flex;align-items:center;justify-content:space-between;}
.bat-logo{display:flex;align-items:center;gap:9px;}
.bat-symbol{width:32px;height:20px;}
.bat-symbol svg path{fill:var(--gold);}
.bat-name{font-family:Impact,'Arial Narrow',sans-serif;font-weight:700;font-size:24px;letter-spacing:3px;color:var(--white);text-transform:uppercase;}
.bat-name span{color:var(--gold);}
.bat-sub{font-size:11px;color:#cccccc;font-family:'Courier New',monospace;letter-spacing:1.5px;margin-top:2px;}
.header-right{text-align:right;}
.header-streak{font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;color:var(--gold);font-weight:600;line-height:1;}
.header-date{font-size:10px;color:#bbb;font-family:'Courier New',monospace;}

.card{margin:11px 13px 0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,0.3),transparent);}
.card-title{font-size:11px;font-family:'Courier New',monospace;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);}

.score-wrap{display:flex;align-items:center;gap:14px;}
.ring-outer{position:relative;width:84px;height:84px;flex-shrink:0;}
.ring-outer svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--bg4);stroke-width:7;}
.ring-fill{fill:none;stroke:var(--gold);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-family:Impact,'Arial Narrow',sans-serif;font-size:24px;font-weight:700;color:var(--white);line-height:1;}
.ring-unit{font-size:10px;color:#bbb;font-family:'Courier New',monospace;}
.score-right{flex:1;}
.day-status{font-family:Impact,'Arial Narrow',sans-serif;font-size:28px;font-weight:700;letter-spacing:1px;line-height:1;}
.day-status.win{color:var(--green);}
.day-status.fail{color:var(--red);}
.day-status.pend{color:#ccc;}
.score-detail{font-size:11px;color:var(--muted2);margin-top:5px;line-height:1.6;}

.hm-banner{margin:11px 13px 0;background:linear-gradient(135deg,#1a0a0a,#200808);border:1px solid rgba(204,51,51,0.4);border-radius:var(--radius);padding:11px 13px;display:flex;align-items:center;gap:11px;}
.hm-banner.gold-banner{background:linear-gradient(135deg,#100e02,#1a1505);border-color:rgba(200,168,75,0.25);}
.hm-icon{font-size:24px;flex-shrink:0;}
.hm-title{font-family:Impact,'Arial Narrow',sans-serif;font-size:15px;color:var(--red);letter-spacing:2px;}
.hm-title.gold{color:var(--gold);}
.hm-sub{font-size:9px;color:#885544;font-family:'Courier New',monospace;margin-top:2px;}
.hm-sub.gold{color:#887733;}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:11px 13px 0;}
.qbtn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 8px;color:var(--muted3);font-family:Impact,'Arial Narrow',sans-serif;font-size:13px;letter-spacing:1.5px;cursor:pointer;text-align:center;transition:all 0.15s;}
.qbtn:active{opacity:0.75;transform:scale(0.97);}
.qbtn.gold{border-color:var(--border2);color:var(--gold);}
.qbtn.red{border-color:rgba(204,51,51,0.35);color:var(--red);}
.qbtn-sub{font-size:8px;font-family:'Courier New',monospace;color:var(--muted);letter-spacing:0;display:block;margin-top:3px;}

.binary-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.binary-row:last-child{border-bottom:none;padding-bottom:0;}
.b-label{font-size:16px;color:#ffffff;font-weight:500;}
.b-sub{font-size:12px;color:#bbb;margin-top:3px;}
.tog-group{display:flex;gap:6px;flex-shrink:0;}
.tog{padding:7px 13px;border-radius:6px;border:1px solid #333;background:var(--bg3);color:#bbb;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;transition:all 0.15s;}
.tog.y.on{background:rgba(60,200,122,0.15);border-color:var(--green);color:var(--green);}
.tog.n.on{background:rgba(224,68,68,0.15);border-color:var(--red);color:var(--red);}

/* RANK BADGE */
.rank-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:1px;border:1px solid;}
.rank-0{background:rgba(150,150,150,0.1);border-color:#555;color:#aaa;}
.rank-1{background:rgba(139,90,43,0.15);border-color:#8B5A2B;color:#cd9b6e;}
.rank-2{background:rgba(255,140,0,0.1);border-color:#ff8c00;color:#ffaa33;}
.rank-3{background:rgba(200,168,75,0.12);border-color:var(--gold);color:var(--gold);}
.rank-4{background:rgba(42,106,173,0.15);border-color:#2a6aad;color:#5a9adf;}
.rank-5{background:rgba(128,0,128,0.15);border-color:#800080;color:#cc66cc;}
.rank-6{background:rgba(204,51,51,0.15);border-color:var(--red);color:#ff6666;}
.rank-7{background:rgba(30,30,30,0.8);border-color:#555;color:#eee;}
.rank-8{background:rgba(180,0,0,0.2);border-color:#cc0000;color:#ff4444;}
.rank-9{background:rgba(200,168,75,0.2);border-color:var(--gold2);color:var(--gold2);box-shadow:0 0 8px rgba(200,168,75,0.3);}

/* RANK PROGRESS */
.rank-progress-wrap{margin-top:10px;}
.rank-progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:6px;}
.rank-progress-fill{height:100%;border-radius:2px;background:var(--gold);transition:width 0.8s ease;}

.sl-row{padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.sl-row:last-child{border-bottom:none;}
.sl-top{display:flex;justify-content:space-between;margin-bottom:8px;}
.sl-label{font-size:15px;color:#ffffff;}
.sl-val{font-family:'Courier New',monospace;font-size:13px;color:var(--gold);}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--bg5);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:var(--gold);border-radius:50%;cursor:pointer;}

.inp{width:100%;background:var(--bg3);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#ffffff;font-size:15px;font-family:-apple-system,sans-serif;padding:11px 13px;outline:none;resize:none;transition:border-color 0.2s;}
.inp:focus{border-color:var(--gold2);}
.inp-label{font-size:11px;color:#cccccc;font-family:'Courier New',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.inp-group{margin-bottom:12px;}
.inp-group:last-child{margin-bottom:0;}

.m-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.m-item:last-child{border-bottom:none;}
.m-check{width:22px;height:22px;border:1.5px solid #666;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.m-check.done{background:var(--green);border-color:var(--green);}
.m-check.done::after{content:'✓';font-size:13px;color:#050505;font-weight:700;}
.m-text{flex:1;font-size:15px;color:#ffffff;}
.m-text.done{text-decoration:line-through;color:#666;}

.epills{display:flex;gap:7px;flex-wrap:wrap;}
.epill{padding:8px 14px;border-radius:20px;border:1px solid #333;background:var(--bg3);color:#bbb;font-size:12px;font-family:'Courier New',monospace;cursor:pointer;transition:all 0.15s;}
.epill.calm.on{background:rgba(60,200,122,0.15);border-color:var(--green);color:var(--green);}
.epill.revenge.on{background:rgba(224,68,68,0.15);border-color:var(--red);color:var(--red);}
.epill.greedy.on{background:rgba(200,168,75,0.15);border-color:var(--gold);color:var(--gold);}
.epill.neutral.on{background:rgba(150,150,150,0.15);border-color:#aaa;color:#ddd;}

.save-btn{width:calc(100% - 26px);margin:11px 13px 0;background:var(--gold);color:#050505;border:none;border-radius:var(--radius);padding:16px;font-family:Impact,'Arial Narrow',sans-serif;font-size:19px;letter-spacing:3px;cursor:pointer;transition:all 0.15s;font-weight:600;}
.save-btn:active{transform:scale(0.98);opacity:0.88;}

.wake-big{font-family:Impact,'Arial Narrow',sans-serif;font-size:52px;font-weight:700;color:#ffffff;text-align:center;letter-spacing:4px;line-height:1;}
.wake-sub{text-align:center;font-size:11px;color:#cccccc;font-family:'Courier New',monospace;margin-top:4px;letter-spacing:1px;}
.wake-status{margin:11px 0 0;padding:12px;border-radius:8px;text-align:center;font-family:Impact,'Arial Narrow',sans-serif;font-size:16px;letter-spacing:2px;}
.wake-status.wait{background:rgba(200,168,75,0.07);color:var(--gold);border:1px solid var(--border);}
.wake-status.ok{background:rgba(60,200,122,0.12);color:var(--green);border:1px solid rgba(60,200,122,0.35);}
.wake-status.fail{background:rgba(224,68,68,0.12);color:var(--red);border:1px solid rgba(224,68,68,0.35);}
.imup-btn{width:100%;margin-top:11px;background:var(--green);color:#050505;border:none;border-radius:var(--radius);padding:17px;font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;font-weight:700;transition:all 0.15s;}
.imup-btn:active{transform:scale(0.97);}

.proof-zone{border:1.5px dashed var(--border2);border-radius:8px;padding:13px;text-align:center;cursor:pointer;background:var(--bg3);margin-top:6px;}
.proof-zone.locked{border-color:var(--green);border-style:solid;}
.p-icon{font-size:20px;margin-bottom:4px;}
.p-text{font-size:9px;font-family:'Courier New',monospace;color:var(--muted2);letter-spacing:1px;}
.proof-preview{width:100%;border-radius:6px;margin-top:7px;max-height:100px;object-fit:cover;display:none;}
.proof-preview.show{display:block;}
input[type=file]{display:none;}

.p-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.p-item:last-child{border-bottom:none;}
.p-ico{font-size:16px;width:26px;text-align:center;flex-shrink:0;}
.p-txt{flex:1;font-size:12px;color:var(--muted3);}
.p-badge{font-size:8px;font-family:'Courier New',monospace;padding:3px 7px;border-radius:4px;}
.p-badge.act{background:rgba(204,51,51,0.15);color:var(--red);border:1px solid rgba(204,51,51,0.3);}

.hm-badge{display:inline-block;padding:2px 7px;border-radius:4px;background:rgba(204,51,51,0.15);border:1px solid rgba(204,51,51,0.3);color:var(--red);font-size:8px;font-family:'Courier New',monospace;letter-spacing:1px;}

.stabs{display:flex;gap:7px;margin:11px 13px 0;overflow-x:auto;padding-bottom:2px;}
.stabs::-webkit-scrollbar{display:none;}
.stab{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--muted2);font-size:9px;font-family:'Courier New',monospace;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.stab.active{background:var(--bg3);border-color:var(--border2);color:var(--gold);}

/* LEADERBOARD */
.lb-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.lb-item:last-child{border-bottom:none;}
.lb-rank{font-family:Impact,'Arial Narrow',sans-serif;font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.lb-rank.gold{color:var(--gold);}
.lb-rank.silver{color:#aaa;}
.lb-rank.bronze{color:#cd7f32;}
.lb-info{flex:1;}
.lb-name{font-size:15px;color:#ffffff;font-weight:500;}
.lb-name.me{color:var(--gold);}
.lb-stats{font-size:11px;color:#bbb;font-family:'Courier New',monospace;margin-top:2px;}
.lb-score{text-align:right;}
.lb-num{font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;color:var(--gold);}
.lb-lbl{font-size:9px;color:#bbb;font-family:'Courier New',monospace;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{background:var(--bg3);border-radius:9px;padding:12px;border:1px solid var(--border);text-align:center;}
.stat-num{font-family:Impact,'Arial Narrow',sans-serif;font-size:30px;color:var(--gold);line-height:1;font-weight:700;}
.stat-lbl{font-size:9px;font-family:'Courier New',monospace;color:#bbb;margin-top:3px;text-transform:uppercase;letter-spacing:1px;}

.heatmap{display:flex;gap:4px;justify-content:space-between;}
.heat-day{flex:1;text-align:center;}
.heat-bar{height:22px;border-radius:4px;margin-bottom:3px;}
.heat-label{font-size:9px;font-family:'Courier New',monospace;color:#bbb;}

.id-quote{font-family:Impact,'Arial Narrow',sans-serif;font-size:28px;line-height:1.15;letter-spacing:1px;color:#ffffff;border-left:3px solid var(--gold);padding-left:13px;margin-bottom:5px;font-weight:600;}
.code-item{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start;}
.ca{color:var(--gold);font-family:'Courier New',monospace;font-size:12px;flex-shrink:0;margin-top:1px;}
.ct{font-size:13px;color:#cccccc;line-height:1.5;}

.logout-btn{width:calc(100% - 26px);margin:11px 13px 0;background:transparent;color:var(--red);border:1px solid rgba(224,68,68,0.3);border-radius:var(--radius);padding:13px;font-family:'Courier New',monospace;font-size:13px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;}

.spacer{height:14px;}

#toast{position:fixed;top:calc(18px + var(--safe-t));left:50%;transform:translateX(-50%) translateY(-100px);background:var(--bg3);border:1px solid var(--gold);border-radius:30px;padding:9px 18px;font-family:'Courier New',monospace;font-size:12px;color:var(--gold);z-index:9998;transition:transform 0.3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
#toast.show{transform:translateX(-50%) translateY(0);}

.loading{text-align:center;padding:30px;font-family:'Courier New',monospace;font-size:12px;color:#bbb;letter-spacing:2px;}

/* ===== TUTORIAL ===== */
#tutorial{position:fixed;inset:0;z-index:6000;pointer-events:none;opacity:0;transition:opacity 0.3s;}
#tutorial.show{opacity:1;pointer-events:all;}
#tut-backdrop{position:absolute;inset:0;pointer-events:all;}
.tut-spotlight{position:absolute;border-radius:12px;border:2px solid var(--gold);z-index:6001;pointer-events:none;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 0 2px var(--gold),0 0 20px rgba(200,168,75,0.4);}
.tut-card{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:20px;max-width:300px;width:85vw;box-shadow:0 8px 32px rgba(0,0,0,0.8);z-index:6002;}
.tut-step{font-size:9px;font-family:'Courier New',monospace;color:var(--gold);letter-spacing:2px;margin-bottom:8px;}
.tut-title{font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;margin-bottom:8px;line-height:1.1;}
.tut-body{font-size:13px;color:#ccc;line-height:1.65;margin-bottom:16px;}
.tut-body strong{color:#fff;}
.tut-footer{display:flex;align-items:center;justify-content:space-between;}
.tut-dots{display:flex;gap:5px;}
.tut-dot{width:6px;height:6px;border-radius:50%;background:#333;transition:background 0.2s;}
.tut-dot.active{background:var(--gold);}
.tut-btn{background:var(--gold);color:#050505;border:none;border-radius:8px;padding:10px 20px;font-family:Impact,'Arial Narrow',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;}
.tut-skip{background:none;border:none;color:#555;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;padding:4px;}

/* XP POP */
@keyframes xpPop{0%{opacity:0;transform:translateY(0);}20%{opacity:1;}80%{opacity:1;transform:translateY(-30px);}100%{opacity:0;transform:translateY(-50px);}}

/* USER PROFILE POPUP */
#user-profile-popup{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:4000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
#user-profile-popup.show{opacity:1;pointer-events:all;}
.user-profile-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:500px;transform:translateY(100%);transition:transform 0.3s ease;}
#user-profile-popup.show .user-profile-sheet{transform:translateY(0);}

/* BADGE POPUP */
#badge-popup{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:4000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}

.badge-popup-emoji{font-size:52px;margin-bottom:12px;}
.badge-popup-name{font-family:Impact,'Arial Narrow',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;margin-bottom:8px;}
.badge-popup-desc{font-size:14px;color:#ccc;line-height:1.6;margin-bottom:16px;}
.badge-popup-status{font-size:11px;font-family:'Courier New',monospace;letter-spacing:1px;padding:6px 14px;border-radius:20px;}
.badge-popup-status.earned{background:rgba(200,168,75,0.15);color:var(--gold);border:1px solid var(--border2);}
.badge-popup-status.locked{background:rgba(255,255,255,0.05);color:#666;border:1px solid #333;}
.badge-popup-close{margin-top:14px;font-size:11px;color:#555;font-family:'Courier New',monospace;cursor:pointer;}
.badge-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:4px;}
.badge-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
.badge-item.earned{border-color:rgba(200,168,75,0.5);background:rgba(200,168,75,0.08);}
.badge-item.locked{opacity:0.3;filter:grayscale(1);}
.badge-emoji{font-size:26px;margin-bottom:5px;}
.badge-name{font-size:9px;font-family:'Courier New',monospace;color:#ccc;letter-spacing:0.5px;line-height:1.3;}
.badge-name.earned{color:var(--gold);}

/* PROFILE */
.profile-header{display:flex;align-items:center;gap:14px;padding:4px 0 12px;}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:rgba(200,168,75,0.15);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.profile-name{font-family:Impact,'Arial Narrow',sans-serif;font-size:24px;color:#fff;letter-spacing:2px;}
.profile-rank{font-size:11px;font-family:'Courier New',monospace;color:#bbb;margin-top:3px;}
.xp-bar-wrap{margin-top:10px;}
.xp-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:5px;}
.xp-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 1s ease;}

/* COLD CALLS */
.cc-stat{text-align:center;flex:1;}
.cc-num{font-family:Impact,'Arial Narrow',sans-serif;font-size:28px;color:var(--gold);}
.cc-lbl{font-size:9px;font-family:'Courier New',monospace;color:#bbb;margin-top:2px;text-transform:uppercase;letter-spacing:1px;}

/* ===== LOADING SCREEN ===== */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;}
#loading-screen.hidden{display:none;}
.loading-bat{animation:batSpin 1.2s ease-in-out infinite;}
@keyframes batSpin{
  0%{transform:scale(1) rotate(0deg);filter:drop-shadow(0 0 6px rgba(200,168,75,0.4));}
  50%{transform:scale(1.15) rotate(5deg);filter:drop-shadow(0 0 16px rgba(200,168,75,0.8));}
  100%{transform:scale(1) rotate(0deg);filter:drop-shadow(0 0 6px rgba(200,168,75,0.4));}
}
.loading-text{font-family:'Courier New',monospace;font-size:11px;color:#888;letter-spacing:3px;margin-top:20px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* ===== CARD ANIMATIONS ===== */
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card{animation:slideUp 0.3s ease both;pointer-events:auto;}
.card:nth-child(1){animation-delay:0.03s;}
.card:nth-child(2){animation-delay:0.07s;}
.card:nth-child(3){animation-delay:0.11s;}
.card:nth-child(4){animation-delay:0.15s;}
.card:nth-child(5){animation-delay:0.19s;}
.hm-banner{animation:slideUp 0.25s ease both;pointer-events:auto;}
.quick-grid{animation:slideUp 0.25s ease 0.05s both;pointer-events:auto;}
.card *{pointer-events:auto;}

/* ===== HABIT ROW FLASH ===== */
@keyframes greenFlash{0%{background:transparent;}50%{background:rgba(60,200,122,0.1);}100%{background:transparent;}}
@keyframes redFlash{0%{background:transparent;}50%{background:rgba(224,68,68,0.1);}100%{background:transparent;}}
.binary-row.flash-yes{animation:greenFlash 0.4s ease;}
.binary-row.flash-no{animation:redFlash 0.4s ease;}

/* ===== MISSION CHECK BOUNCE ===== */
@keyframes checkBounce{0%{transform:scale(1);}40%{transform:scale(1.35);}70%{transform:scale(0.9);}100%{transform:scale(1);}}
.m-check.bounce{animation:checkBounce 0.4s ease;}

/* ===== I'M UP FLASH ===== */
#gold-flash{position:fixed;inset:0;background:rgba(200,168,75,0.25);z-index:5000;opacity:0;pointer-events:none;transition:opacity 0.15s;}

.result-score{font-family:'Courier New',monospace;font-size:14px;color:#aaa;margin-top:12px;letter-spacing:2px;animation:resultPop 0.5s 0.2s both;}
.result-tap{font-family:'Courier New',monospace;font-size:11px;color:#555;margin-top:40px;letter-spacing:2px;}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

// AUTH
window.switchTab = (mode) => {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='signup')));
  document.getElementById('signup-fields').style.display = mode==='signup'?'block':'none';

};

window.handleAuth = async () => {
  const email = document.getElementById('inp-email').value.trim();
  const password = document.getElementById('inp-password').value;
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';

  if(!email||!password){errEl.textContent='Fill in all fields.';return;}

      const uname = document.getElementById('inp-username').value.trim();
      if(!uname){errEl.textContent='Enter a username.';return;}
      if(uname.length<3){errEl.textContent='Username too short.';return;}

    const wins=getWeeklyData().filter(d=>d.nonNeg&&Object.values(d.nonNeg).every(v=>v===true)).length;
    const xp=calcTotalXP();
    const newRankIdx=getRankIdx(streak,wins,xp);
    if(newRankIdx>prevRankIdx){showRankUp(newRankIdx);}

// SAFETY NET — never stay stuck on loading screen
setTimeout(()=>{
  const ls = document.getElementById('loading-screen');
  if(ls && !ls.classList.contains('hidden')){

// SOUND EFFECTS using Web Audio API (no files needed)
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio(){
  if(!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSound(type){
  try {
    const ctx = getAudio();
    const g = ctx.createGain();
    g.connect(ctx.destination);

    if(type === 'check'){
      // satisfying "ding" for mission complete
      const o = ctx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.5);
    }
    else if(type === 'yes'){
      // soft positive click
      const o = ctx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.frequency.setValueAtTime(440, ctx.currentTime);
      o.frequency.setValueAtTime(550, ctx.currentTime + 0.05);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.15);
    }
    else if(type === 'no'){
      // dull thud
      const o = ctx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.frequency.setValueAtTime(220, ctx.currentTime);
      o.frequency.setValueAtTime(180, ctx.currentTime + 0.05);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.15);
    }
    else if(type === 'gold'){
      // gold flash epic chord
      [523,659,784,1047].forEach((freq, i)=>{
        const o = ctx.createOscillator();
        const gn = ctx.createGain();
        o.connect(gn); gn.connect(ctx.destination);
        o.type = 'sine';
        gn.gain.setValueAtTime(0, ctx.currentTime + i*0.04);
        gn.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i*0.04 + 0.02);
        gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        o.frequency.setValueAtTime(freq, ctx.currentTime);
        o.start(ctx.currentTime + i*0.04);
        o.stop(ctx.currentTime + 0.6);
      });
    }
    else if(type === 'rankup'){
      // dramatic rank up fanfare
      [262,330,392,523,659,784].forEach((freq, i)=>{
        const o = ctx.createOscillator();
        const gn = ctx.createGain();
        o.connect(gn); gn.connect(ctx.destination);
        o.type = 'triangle';
        gn.gain.setValueAtTime(0, ctx.currentTime + i*0.08);
        gn.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i*0.08 + 0.04);
        gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.08 + 0.4);
        o.frequency.setValueAtTime(freq, ctx.currentTime);
        o.start(ctx.currentTime + i*0.08);
        o.stop(ctx.currentTime + i*0.08 + 0.4);
      });
    }
    else if(type === 'save'){
      // clean save whoosh
      const o = ctx.createOscillator();
      o.connect(g);
      o.type = 'sine';
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.frequency.setValueAtTime(330, ctx.currentTime);
      o.frequency.linearRampToValueAtTime(660, ctx.currentTime + 0.2);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.3);
    }
  } catch(e){}
}

function drawTutCanvas(rect){
  const canvas=document.getElementById('tut-canvas');
  if(!canvas)return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if(rect){
    // cut a hole
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();
    const pad=8;
    const r=12;
    const x=rect.left-pad,y=rect.top-pad,w=rect.width+pad*2,h=rect.height+pad*2;
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();ctx.fill();
    ctx.globalCompositeOperation='source-over';
    // gold border around hole
    ctx.strokeStyle='#C8A84B';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();ctx.stroke();
  }
}

function showTutStep(){
  const step=TUT_STEPS[tutStep];
  const total=TUT_STEPS.length;
  document.getElementById('tut-step').textContent=`STEP ${tutStep+1} / ${total}`;
  document.getElementById('tut-title').textContent=step.title;
  document.getElementById('tut-body').innerHTML=step.body;
  const btn=document.getElementById('tut-btn');
  if(btn)btn.textContent=step.last?'LETS GO 🔱':'NEXT →';
  const dots=document.getElementById('tut-dots');
  if(dots)dots.innerHTML=TUT_STEPS.map((_,i)=>`<div class="tut-dot ${i===tutStep?'active':''}"></div>`).join('');
  const card=document.getElementById('tut-card');
  if(!card)return;

  if(step.target){
    const el=document.getElementById(step.target);
    if(el){
      const rect=el.getBoundingClientRect();
      drawTutCanvas(rect);
      const spaceAbove=rect.top;
      if(spaceAbove>240){
        card.style.cssText=`position:absolute;left:50%;transform:translateX(-50%);bottom:${window.innerHeight-rect.top+20}px;z-index:6002;`;
      } else {
        card.style.cssText=`position:absolute;left:50%;transform:translateX(-50%);top:${rect.bottom+20}px;z-index:6002;`;
      }
      return;
    }
  }
  // center — no spotlight
  drawTutCanvas(null);
  card.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6002;';
}

const todayKey = () => new Date().toISOString().split('T')[0];

function calcHardDays(){
  const week=Math.floor(Date.now()/(7*24*3600*1000));
  const s=week*9301+49297;
  const wd=[1,2,3,4,5];
  const d1=wd[s%5];const d2=wd[(s>>3)%5];
  return d1===d2?[d1,wd[(d1)%5]]:[d1,d2];
}

function freshState(){
  const hd=calcHardDays();const td=new Date().getDay();
  return{date:todayKey(),hardMode:hd.includes(td),hardModeDays:hd,
    wakeUp:{target:localStorage.getItem('wake_time')||'06:45',confirmed:null,confirmedAt:null},
    nonNeg:{wake:null,train:null,trade:null,content:null,missions:null},

    trading:{followed:null,emotion:null,trades:0,pnl:''},
    physical:{done:null,intensity:5,pushed:null,nutrition:null,sleep:7},
    dopamine:{social:0,gaming:0,youtube:0,wasted:null},

}

async function syncToFirebase(){
  if(!currentUser) return;
  try {
    const streak=getStreak();
    const days=getWeeklyData();
    const wins=days.filter(d=>d.nonNeg&&Object.values(d.nonNeg).every(v=>v===true)).length;
    const xp=calcTotalXP();
    const badges=getEarnedBadges().map(b=>b.id);
    await setDoc(doc(db,'users',currentUser.uid),{
      username,
      totalWins:wins,
      currentStreak:streak,
      totalXP:xp,
      badges,
      lastActive:todayKey(),
      updatedAt:serverTimestamp()
    },{merge:true});
  } catch(e){}
}

function getWeeklyData(){
  const days=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const r=localStorage.getItem('mrdruga_'+d.toISOString().split('T')[0]);if(r)days.push(JSON.parse(r));}
  return days;
}

function getStreak(){
  let s=0;
  for(const d of getWeeklyData()){if(d.nonNeg&&Object.values(d.nonNeg).every(v=>v===true))s++;else break;}
  return s;
}

function calcScore(){
  let pts=0,total=0;
  ['wake','train','trade','content','missions'].forEach(k=>{total++;if(state.nonNeg[k]===true)pts++;});
  if(state.trading.followed!==null){total++;if(state.trading.followed===true)pts++;}
  if(state.physical.done!==null){total++;if(state.physical.done===true)pts++;}
  if(state.physical.pushed!==null){total++;if(state.physical.pushed===true)pts++;}
  if(state.hardMode){total++;if(state.nonNeg.train===true&&state.dopamine.social===0)pts++;}
  return{pts,total:Math.max(total,1)};
}

function isWin(){return Object.values(state.nonNeg).every(v=>v===true);}

function getRankIdx(streak,wins,xp){
  if(xp===undefined) xp=calcTotalXP();
  let r=0;
  for(let i=0;i<RANKS.length;i++){if(xp>=RANKS[i].minXP)r=i;}
  return r;
}

function getRankProgress(streak,wins,xp){
  if(xp===undefined) xp=calcTotalXP();
  const cur=getRankIdx(streak,wins,xp);
  if(cur>=RANKS.length-1)return 100;
  const curXP=RANKS[cur].minXP;
  const nextXP=RANKS[cur+1].minXP;
  return Math.round((xp-curXP)/(nextXP-curXP)*100);
}

window.setMoreTab = async (t) => {
  moreTab=t;
  document.querySelectorAll('.stab').forEach(b=>{
    const ids=['profile','leaderboard','coldcalls','weekly','identity'];
    const labels=['Profile','Board','Calls','Weekly','Identity'];
    b.classList.toggle('active',b.textContent.includes(labels[ids.indexOf(t)]));
  });
  const el=document.getElementById('more-body');
  if(!el)return;
  if(t==='leaderboard'){
    el.innerHTML='<div class="loading">LOADING...</div>';
    const html=await renderLeaderboard();
    const el2=document.getElementById('more-body');
    if(el2)el2.innerHTML=html;
  } else if(t==='profile')el.innerHTML=renderProfile();
  else if(t==='coldcalls')el.innerHTML=renderColdCalls();
  else if(t==='weekly')el.innerHTML=renderWeekly();
  else if(t==='identity')el.innerHTML=renderIdentity();
};

async function renderLeaderboard(){
  try {
    const snap = await getDocs(collection(db,'users'));
    const users = [];
    snap.forEach(d=>users.push({id:d.id,...d.data()}));
    users.sort((a,b)=>((b.totalXP||0))-((a.totalXP||0)));
    const medals=['🥇','🥈','🥉'];
    const rankClass=['gold','silver','bronze'];
    return`<div class="card" style="margin-top:11px">
      <div class="card-title">🏆 Leaderboard — Live</div>
      ${users.length===0?'<div style="font-size:12px;color:var(--muted2);text-align:center;padding:20px">No users yet — invite your friends!</div>':
      users.map((u,i)=>{
        const rIdx=getRankIdx(u.currentStreak||0,u.totalWins||0);
        const rank=RANKS[rIdx];
        return`<div class="lb-item">
          <div class="lb-rank ${rankClass[i]||''}">${medals[i]||i+1}</div>
          <div class="lb-info" onclick="${u.id!==currentUser?.uid?`showUserProfile('${u.id}')`:''}" style="${u.id!==currentUser?.uid?'cursor:pointer':''}">
            <div class="lb-name ${u.id===currentUser?.uid?'me':''}">${u.username||'Unknown'}${u.id===currentUser?.uid?' (you)':' →'}</div>
            <div style="margin-top:3px"><span class="rank-badge rank-${rIdx}" style="font-size:9px;padding:2px 7px">${rank.emoji} ${rank.name}</span></div>
            <div class="lb-stats" style="margin-top:3px">${u.totalWins||0} wins · ${u.currentStreak||0}🔥 streak</div>
          </div>
          <div class="lb-score">
            <div class="lb-num" style="font-size:18px">${u.totalXP||0}</div>
            <div class="lb-lbl">XP</div>
          </div>
        </div>`}).join('')}
    </div>
    <div class="card">
      <div class="card-title">Rank Guide</div>
      ${RANKS.map((r,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <span class="rank-badge rank-${i}" style="font-size:9px;padding:2px 8px">${r.emoji} ${r.name}</span>
        <span style="font-size:11px;color:#bbb;font-family:'Courier New',monospace">${r.minXP} XP</span>
      </div>`).join('')}
    </div>`;
  } catch(e){
    return`<div class="card" style="margin-top:11px"><div style="font-size:12px;color:var(--muted2)">Could not load leaderboard.</div></div>`;
  }
}

function renderWeekly(){
  const days=getWeeklyData();
  const wins=days.filter(d=>d.nonNeg&&Object.values(d.nonNeg).every(v=>v===true)).length;
  const fails=days.length-wins;const total=Math.max(days.length,1);
  const tDisc=days.filter(d=>d.trading&&d.trading.followed===true).length;
  return`<div class="card" style="margin-top:11px"><div class="card-title">This Week</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${wins}</div><div class="stat-lbl">Days Won</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red)">${fails}</div><div class="stat-lbl">Days Failed</div></div>
      <div class="stat-box"><div class="stat-num">${Math.round(wins/total*100)}%</div><div class="stat-lbl">Win Rate</div></div>
      <div class="stat-box"><div class="stat-num">${tDisc}</div><div class="stat-lbl">Trade Discipline</div></div>
      <div class="stat-box"><div class="stat-num">${getStreak()}</div><div class="stat-lbl">Streak</div></div>
      <div class="stat-box"><div class="stat-num">${days.filter(d=>d.proof&&d.proof.train).length}</div><div class="stat-lbl">Proof Days</div></div>
    </div>
    <div style="margin-top:12px;text-align:center;font-family:'Courier New',monospace;font-size:10px;color:${wins>=5?'var(--green)':wins>=3?'var(--gold)':'var(--red)'}">
      ${wins>=5?'🔥 ELITE WEEK':wins>=3?'⚡ SOLID — PUSH HARDER':'⚠️ WEAK WEEK — RESET NOW'}
    </div>
  </div>`;
}

function renderIdentity(){
  const qs=["I execute even when I don't feel like it.","Comfort is the enemy.","Discipline over emotion. Always.","God sees your effort. Do not waste it.","The man you want to become is built today.","No one is coming to save you.","Faith without works is dead."];
  const q=qs[new Date().getDay()%qs.length];
  return`
  <div class="card" style="margin-top:11px"><div class="card-title">Today's Word</div><div class="id-quote">${q}</div></div>
  <div class="card"><div class="card-title">Mission</div><div style="font-size:13px;color:var(--muted2);line-height:1.8">Become a man of God. Build Ares Digital into a real business. Master trading discipline. Achieve financial independence — not for comfort, but for freedom to serve God and others.<br><br><span style="color:var(--gold);font-family:'Courier New',monospace;font-size:10px">YOU ARE 17. MOST ARE WASTING TIME. YOU ARE NOT.</span></div></div>
  <div class="card"><div class="card-title">The Code</div>
    ${['Faith first. Always.','Execute. Review. Improve.','Cold calls even when scared.','No editing proof after submit.','No skipping Hard Mode. Ever.','No negotiating in bed.'].map(c=>`<div class="code-item"><div class="ca">→</div><div class="ct">${c}</div></div>`).join('')}
  </div>`;
}

function renderHardMode(){
  const hd=state.hardModeDays||[];const td=new Date().getDay();
  return`<div class="card" style="margin-top:11px"><div class="card-title">🔱 Hard Mode Schedule</div>
    <div style="font-size:9px;color:var(--muted2);font-family:'Courier New',monospace;margin-bottom:13px">RANDOMIZED WEEKLY · THE SYSTEM CHOOSES</div>
    ${DOW.map((d,i)=>{const isH=hd.includes(i),isT=i===td;return`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <div style="font-size:13px;color:${isT?'var(--white)':'var(--muted2)'}">${d}${isT?' — TODAY':''}</div>
        ${isH?`<span class="hm-badge">HARD MODE</span>`:`<span style="font-size:9px;font-family:'Courier New',monospace;color:var(--muted)">NORMAL</span>`}
      </div>`}).join('')}
  </div>`;
}

// SETTERS
window.setNN=(k,v)=>{
  state.nonNeg[k]=v;saveState();
  playSound(v?'yes':'no');
  // update buttons in place without re-rendering
  document.querySelectorAll('.tog').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc.includes(`'${k}'`)){
      if(oc.includes('true'))b.classList.toggle('on',v===true);
      if(oc.includes('false'))b.classList.toggle('on',v===false);
    }
  });
  // flash the row
  document.querySelectorAll('.binary-row').forEach(r=>{
    if(r.innerHTML.includes(`'${k}'`)){
      r.classList.add(v?'flash-yes':'flash-no');
      setTimeout(()=>r.classList.remove('flash-yes','flash-no'),500);
    }
  });
};
window.setMission=(i,v)=>{state.missions[i]=v;saveState();};
window.toggleMission=(i)=>{
  state.missionsDone[i]=!state.missionsDone[i];
  playSound(state.missionsDone[i]?'check':'no');
  saveState();render();
  setTimeout(()=>{
    const checks=document.querySelectorAll('.m-check');
    if(checks[i]){checks[i].classList.add('bounce');setTimeout(()=>checks[i].classList.remove('bounce'),500);}
  },10);
};
window.setTrade=(k,v)=>{state.trading[k]=v;saveState();};
window.setPhys=(k,v)=>{
  state.physical[k]=v;saveState();
  document.querySelectorAll('.tog').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc.includes(`'${k}'`)&&oc.includes('setPhys(')){
      if(oc.includes('true'))b.classList.toggle('on',v===true);
      if(oc.includes('false'))b.classList.toggle('on',v===false);
    }
  });
};
window.setPhysS=(k,v)=>{
  state.physical[k]=v;saveState();
  document.querySelectorAll('.tog').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc.includes(`'${k}'`)&&oc.includes('setPhysS')){
      b.classList.toggle('on',oc.includes(`'${v}'`));
    }
  });
};
window.setDop=(k,v)=>{
  state.dopamine[k]=v;saveState();
  document.querySelectorAll('.tog').forEach(b=>{
    const oc=b.getAttribute('onclick')||'';
    if(oc.includes(`'${k}'`)&&oc.includes('setDop')){
      if(oc.includes('false'))b.classList.toggle('on',v===false);
      if(oc.includes('true'))b.classList.toggle('on',v===true);
    }
  });
};
window.changeWake=(v)=>{state.wakeUp.target=v;localStorage.setItem('wake_time',v);saveState();};

window.confirmWake=()=>{
  const input=document.getElementById('actual-wake-input');
  const actualTime=input?input.value:'';
  if(!actualTime){toast('⚠️ Enter the time you woke up');return;}

  // compare actual wake time to target
  const[ah,am]=actualTime.split(':').map(Number);
  const[th,tm]=state.wakeUp.target.split(':').map(Number);
  const actualMins=ah*60+am;
  const targetMins=th*60+tm;

  // format for display
  const fmt=(h,m)=>`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

  if(actualMins<=targetMins+5){
    state.wakeUp.confirmed=true;
    state.wakeUp.confirmedAt=fmt(ah,am);
    state.nonNeg.wake=true;
    goldFlash();
    playSound('gold');
    toast(`⚡ Wake confirmed — ${fmt(ah,am)}`);
  } else {
    state.wakeUp.confirmed=false;
    state.wakeUp.confirmedAt=fmt(ah,am);
    state.nonNeg.wake=false;
    playSound('no');
    toast(`❌ Woke up late (${fmt(ah,am)} vs target ${state.wakeUp.target})`);
  }
  saveState();render();
};

window.trigProof=(k)=>{const el=document.getElementById('pf_'+k);if(el)el.click();};
window.handleProof=(k,input)=>{
  if(!input.files||!input.files[0])return;
  if(state.proof[k]){toast('⚠️ Proof already locked');return;}
  const r=new FileReader();
  r.onload=e=>{
    state.proof[k]=e.target.result;
    saveState();
    toast('✓ Proof locked');
    // update directly by ID — no re-render needed
    const zone=document.getElementById('proof-zone-'+k);
    const icon=document.getElementById('proof-icon-'+k);
    const text=document.getElementById('proof-text-'+k);
    const img=document.getElementById('proof-img-'+k);
    if(zone){zone.classList.add('locked');zone.onclick=null;}
    if(icon)icon.textContent='✅';
    if(text)text.textContent='PROOF LOCKED';
    if(img){img.src=e.target.result;img.classList.add('show');}
  };
  r.readAsDataURL(input.files[0]);
};

window.saveAll=()=>{
  // award XP once per day for completed actions
  const todayXpKey='xp_awarded_'+todayKey();
  if(!localStorage.getItem(todayXpKey)){
    let earned=0;
    if(state.nonNeg.wake===true)earned+=XP_ACTIONS.wake;
    if(state.nonNeg.train===true)earned+=XP_ACTIONS.train;
    if(state.nonNeg.trade===true)earned+=XP_ACTIONS.trade;
    if(state.nonNeg.content===true)earned+=XP_ACTIONS.content;
    if(state.nonNeg.missions===true)earned+=XP_ACTIONS.missions;
    if(state.trading.followed===true)earned+=XP_ACTIONS.followedStrategy;
    if(state.physical.done===true)earned+=XP_ACTIONS.trainingDone;
    if(state.physical.pushed===true)earned+=XP_ACTIONS.pushedComfort;
    if(isWin())earned+=XP_ACTIONS.dayWin;
    if(state.hardMode&&isWin())earned+=XP_ACTIONS.hardModeWin;
    if(state.proof.train)earned+=XP_ACTIONS.proof;
    if(earned>0){
      addXP(earned);
      localStorage.setItem(todayXpKey,'1');
    }
  }
  saveState();
  playSound('save');
  const streak=getStreak();
  const wins=getWeeklyData().filter(d=>d.nonNeg&&Object.values(d.nonNeg).every(v=>v===true)).length;
  const xp=calcTotalXP();
  const newRankIdx=getRankIdx(streak,wins,xp);
  const prevRankIdx=parseInt(localStorage.getItem('lastRankIdx')||'0');
  if(newRankIdx>prevRankIdx){showRankUp(newRankIdx);localStorage.setItem('lastRankIdx',newRankIdx);}
  else toast('✓ Saved');
};

window.doLogout=async()=>{
  await signOut(auth);
  state={};
  toast('Signed out');
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// Load leaderboard on more tab
const origRenderMore = renderMore;
